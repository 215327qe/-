<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5학년 6반 빠반</title>
<style>
body{margin:0;font-family:sans-serif;background:#b2c7da;}
.header{background:#fff;padding:15px;text-align:center;font-weight:bold;font-size:20px;border-bottom:1px solid #ddd;}
.container{max-width:900px;margin:0 auto;}
#chatBox{height:calc(100vh - 170px);overflow-y:auto;padding:15px;}
.message{margin:10px 0;}
.name{font-size:12px;color:#444;margin-bottom:4px;}
.bubble{display:inline-block;background:#fff;padding:10px 14px;border-radius:12px;max-width:70%;word-break:break-word;}
.time{font-size:11px;color:#666;margin-top:3px;}
.notice{text-align:center;color:#666;font-size:13px;margin:12px 0;}
.topbar{padding:10px;background:#fff;}
#nameInput{width:100%;padding:10px;box-sizing:border-box;}
.inputWrap{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;padding:10px;gap:8px;border-top:1px solid #ddd;}
#messageInput{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px;}
button{background:#ffeb33;border:none;border-radius:8px;padding:10px 15px;cursor:pointer;}
</style>
</head>
<body>
<div class="header">🎉 5학년 6반 빠반</div>
<div class="container">
<div class="topbar">
<input id="nameInput" placeholder="이름 입력">
</div>
<div id="chatBox">
<div class="notice">채팅방에 오신 것을 환영합니다.</div>
</div>
</div>
<div class="inputWrap">
<input id="messageInput" placeholder="메시지를 입력하세요">
<button onclick="sendMessage()">전송</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmtWhBsPRrrYnsjh2ig-XkVCuO2HbtZaQ",
  authDomain: "class56-bdf85.firebaseapp.com",
  databaseURL: "https://class56-bdf85-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "class56-bdf85",
  storageBucket: "class56-bdf85.firebasestorage.app",
  messagingSenderId: "302150895662",
  appId: "1:302150895662:web:d6231e6fc8ceb3155e77bf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatBox = document.getElementById("chatBox");

const saved = localStorage.getItem("chatName");
if(saved) document.getElementById("nameInput").value = saved;

window.sendMessage = function(){
  const name = document.getElementById("nameInput").value.trim();
  const message = document.getElementById("messageInput").value.trim();

  if(!name || !message){
    alert("이름과 메시지를 입력하세요.");
    return;
  }

  localStorage.setItem("chatName", name);

  push(ref(db, "messages"), {
    name,
    message,
    time: new Date().toLocaleTimeString()
  });

  document.getElementById("messageInput").value = "";
}

document.getElementById("messageInput").addEventListener("keydown", e => {
  if(e.key === "Enter") sendMessage();
});

onChildAdded(ref(db, "messages"), snapshot => {
  const data = snapshot.val();

  const div = document.createElement("div");
  div.className = "message";
  div.innerHTML = `
    <div class="name">${data.name}</div>
    <div class="bubble">${data.message}</div>
    <div class="time">${data.time || ""}</div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>
</body>
</html>
