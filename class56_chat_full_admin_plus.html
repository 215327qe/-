<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5학년 6반 빠반 - 관리자 버전</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#b2c7da;}
.header{background:#fff;padding:15px;text-align:center;font-size:22px;font-weight:bold;}
.top{background:#fff;padding:10px;}
#nameInput{width:100%;padding:10px;box-sizing:border-box;}
#chatBox{height:calc(100vh - 230px);overflow-y:auto;padding:15px;}
.message{margin-bottom:12px;}
.name{font-size:12px;font-weight:bold;}
.bubble{display:inline-block;background:#fff;padding:10px 14px;border-radius:12px;max-width:70%;}
.time{font-size:11px;color:#666;}
.notice{text-align:center;color:#666;margin:10px;}
.adminArea{background:#fff;padding:10px;}
#adminPanel{display:none;}
.inputWrap{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px;display:flex;gap:8px;}
#messageInput{flex:1;padding:10px;}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;}
.sendBtn{background:#ffeb3b;}
.adminBtn{background:#90caf9;}
.danger{background:#e53935;color:#fff;}
</style>
</head>
<body>

<div class="header">🎉 5학년 6반 빠반 🎉</div>

<div class="top">
<input id="nameInput" placeholder="이름 입력">
</div>

<div class="adminArea">
<button class="adminBtn" onclick="adminLogin()">관리자 모드</button>
<div id="adminPanel">

<p>관리자 로그인됨</p>
<input id="banName" placeholder="차단할 이름">
<button onclick="banUser()">차단</button>
<button onclick="unbanUser()">차단해제</button>
<button class="danger" onclick="clearAllMessages()">전체 채팅 삭제</button>

</div>
</div>

<div id="chatBox">
<div class="notice">채팅방에 오신 것을 환영합니다.</div>
</div>

<div class="inputWrap">
<input id="messageInput" placeholder="메시지를 입력하세요">
<button class="sendBtn" onclick="sendMessage()">전송</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
 apiKey:"AIzaSyCmtWhBsPRrrYnsjh2ig-XkVCuO2HbtZaQ",
 authDomain:"class56-bdf85.firebaseapp.com",
 databaseURL:"https://class56-bdf85-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId:"class56-bdf85",
 storageBucket:"class56-bdf85.firebasestorage.app",
 messagingSenderId:"302150895662",
 appId:"1:302150895662:web:d6231e6fc8ceb3155e77bf"
};

const ADMIN_PASSWORD = "13275";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatBox = document.getElementById("chatBox");

const savedName = localStorage.getItem("chatName");
if(savedName) document.getElementById("nameInput").value = savedName;

window.adminLogin = function(){
 const pw = prompt("관리자 비밀번호 입력");
 if(pw === ADMIN_PASSWORD){
   document.getElementById("adminPanel").style.display = "block";
   alert("관리자 로그인 성공");
 } else {
   alert("비밀번호가 틀렸습니다.");
 }
}

window.clearAllMessages = async function(){
 if(confirm("모든 채팅을 삭제할까요?")){
   await remove(ref(db,"messages"));
   chatBox.innerHTML = '<div class="notice">채팅이 삭제되었습니다.</div>';
 }
}


window.banUser = async function(){
 const name=document.getElementById('banName').value.trim();
 if(!name) return alert('이름 입력');
 await set(ref(db,'blockedUsers/'+name), true);
 alert(name+' 차단 완료');
}

window.unbanUser = async function(){
 const name=document.getElementById('banName').value.trim();
 if(!name) return alert('이름 입력');
 await remove(ref(db,'blockedUsers/'+name));
 alert(name+' 차단 해제');
}

window.sendMessage = async function(){
 const name = document.getElementById("nameInput").value.trim();
 const message = document.getElementById("messageInput").value.trim();

 if(!name || !message){
   alert("이름과 메시지를 입력하세요.");
   return;
 }

 const blocked = await get(ref(db,'blockedUsers/'+name));
 if(blocked.exists()){
   alert('차단된 사용자입니다.');
   return;
 }
 localStorage.setItem("chatName", name);

 push(ref(db,"messages"),{
   name:name,
   message:message,
   time:new Date().toLocaleTimeString()
 });

 document.getElementById("messageInput").value = "";
}

document.getElementById("messageInput").addEventListener("keydown",(e)=>{
 if(e.key==="Enter") sendMessage();
});

onChildAdded(ref(db,"messages"), (snapshot)=>{
 const data = snapshot.val(); const msgId=snapshot.key;

 const div = document.createElement("div");
 div.className = "message";
 div.innerHTML = `
   <div class="name">${data.name}</div>
   <div class="bubble">${data.message}</div>
   <div class="time">${data.time || ""}</div>
 `;

 chatBox.appendChild(div);
 chatBox.scrollTop = chatBox.scrollHeight;
});
</script>
</body>
</html>
